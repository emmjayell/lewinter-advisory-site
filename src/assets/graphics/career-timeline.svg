<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" role="img" aria-label="Career timeline. Developer, then lead architect in financial services, then CTO, then manufacturing and operational technology, ending at LeWinter Advisory, independent by design. CISSP and CMMC RP certifications carried into every engagement.">
  <style>
    text { font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }
  </style>

  <!-- Timeline -->
  <line x1="56" y1="130" x2="704" y2="130" stroke="#CFDCDC" stroke-width="2"/>

  <!-- Node 1: Developer (above) -->
  <circle cx="90" cy="130" r="7" fill="#0D8E8C"/>
  <text x="90" y="92" text-anchor="middle" font-size="12.5" font-weight="600" fill="#142A2E">Developer</text>
  <text x="90" y="109" text-anchor="middle" font-size="10.5" fill="#7E9496">still reads the code</text>

  <!-- Node 2: Lead architect (below) -->
  <circle cx="238" cy="130" r="7" fill="#0D8E8C"/>
  <text x="238" y="158" text-anchor="middle" font-size="12.5" font-weight="600" fill="#142A2E">Lead architect</text>
  <text x="238" y="175" text-anchor="middle" font-size="10.5" fill="#7E9496">financial services, where</text>
  <text x="238" y="189" text-anchor="middle" font-size="10.5" fill="#7E9496">wrong was expensive</text>

  <!-- Node 3: CTO (above) -->
  <circle cx="386" cy="130" r="7" fill="#0D8E8C"/>
  <text x="386" y="92" text-anchor="middle" font-size="12.5" font-weight="600" fill="#142A2E">CTO</text>
  <text x="386" y="109" text-anchor="middle" font-size="10.5" fill="#7E9496">owned the whole stack</text>

  <!-- Node 4: Manufacturing and OT (below) -->
  <circle cx="534" cy="130" r="7" fill="#0D8E8C"/>
  <text x="534" y="158" text-anchor="middle" font-size="12.5" font-weight="600" fill="#142A2E">Manufacturing &amp; OT</text>
  <text x="534" y="175" text-anchor="middle" font-size="10.5" fill="#7E9496">plant floor through ERP</text>

  <!-- Terminal node: LeWinter Advisory (above) -->
  <circle cx="668" cy="130" r="9" fill="#085451"/>
  <circle cx="668" cy="130" r="14" fill="none" stroke="#36C9C6" stroke-width="2"/>
  <text x="668" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#085451">LeWinter Advisory</text>
  <text x="668" y="95" text-anchor="middle" font-size="10.5" fill="#7E9496">independent, by design</text>
  <!-- sparkle accent -->
  <path d="M 694 56 l 2.4 6.2 6.2 2.4 -6.2 2.4 -2.4 6.2 -2.4 -6.2 -6.2 -2.4 6.2 -2.4 z" fill="#36C9C6"/>

  <!-- Certification pills -->
  <rect x="272" y="206" width="86" height="28" rx="14" fill="#F4FAFA" stroke="#0D8E8C" stroke-width="1.8"/>
  <text x="315" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#142A2E">CISSP</text>
  <rect x="368" y="206" width="100" height="28" rx="14" fill="#F4FAFA" stroke="#0D8E8C" stroke-width="1.8"/>
  <text x="418" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#142A2E">CMMC RP</text>
  <text x="488" y="224" font-size="11" fill="#7E9496">carried into every engagement</text>
</svg>
