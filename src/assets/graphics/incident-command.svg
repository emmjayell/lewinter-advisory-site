<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="Incident command diagram. Chaos on the left: breach, outage, vendor blame, insurer, counsel, executives asking. One person in command in the center. Ordered outcomes on the right: one plan, clear decisions, plain-language updates, recovery, hardening after.">
  <style>
    text { font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }
  </style>
  <defs>
    <marker id="icArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#0D8E8C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Tangle lines among chaos chips -->
  <g stroke="#CFDCDC" stroke-width="1.3" fill="none">
    <path d="M 105 62 C 150 110, 80 150, 130 196"/>
    <path d="M 170 96 C 110 140, 190 170, 120 230"/>
    <path d="M 90 140 C 160 150, 120 90, 185 230"/>
    <path d="M 150 260 C 120 200, 200 160, 110 96"/>
  </g>

  <!-- Chaos chips -->
  <g font-size="13">
    <rect x="56" y="44" width="84" height="32" rx="9" fill="#FFFFFF" stroke="#7E9496" stroke-width="1.5" transform="rotate(-3 98 60)"/>
    <text x="98" y="64" text-anchor="middle" fill="#506467" transform="rotate(-3 98 60)">Breach</text>

    <rect x="128" y="92" width="84" height="32" rx="9" fill="#FFFFFF" stroke="#7E9496" stroke-width="1.5" transform="rotate(2 170 108)"/>
    <text x="170" y="112" text-anchor="middle" fill="#506467" transform="rotate(2 170 108)">Outage</text>

    <rect x="42" y="138" width="104" height="32" rx="9" fill="#FFFFFF" stroke="#7E9496" stroke-width="1.5" transform="rotate(-2 94 154)"/>
    <text x="94" y="158" text-anchor="middle" fill="#506467" transform="rotate(-2 94 154)">Vendor blame</text>

    <rect x="130" y="184" width="84" height="32" rx="9" fill="#FFFFFF" stroke="#7E9496" stroke-width="1.5" transform="rotate(3 172 200)"/>
    <text x="172" y="204" text-anchor="middle" fill="#506467" transform="rotate(3 172 200)">Insurer</text>

    <rect x="50" y="228" width="84" height="32" rx="9" fill="#FFFFFF" stroke="#7E9496" stroke-width="1.5" transform="rotate(-2 92 244)"/>
    <text x="92" y="248" text-anchor="middle" fill="#506467" transform="rotate(-2 92 244)">Counsel</text>

    <rect x="128" y="262" width="118" height="32" rx="9" fill="#FFFFFF" stroke="#7E9496" stroke-width="1.5" transform="rotate(2 187 278)"/>
    <text x="187" y="282" text-anchor="middle" fill="#506467" transform="rotate(2 187 278)">Executives asking</text>
  </g>

  <!-- Converging lines into command -->
  <g stroke="#7E9496" stroke-width="1.4" fill="none">
    <path d="M 142 60 C 230 80, 270 110, 318 128"/>
    <path d="M 214 108 C 260 120, 290 132, 318 142"/>
    <path d="M 148 154 C 230 156, 280 156, 318 156"/>
    <path d="M 216 200 C 260 188, 290 176, 318 168"/>
    <path d="M 136 244 C 230 226, 276 196, 318 180"/>
    <path d="M 248 278 C 290 250, 304 214, 322 190"/>
  </g>

  <!-- Command node -->
  <rect x="324" y="112" width="156" height="92" rx="16" fill="#085451" stroke="#063E3E" stroke-width="2"/>
  <text x="402" y="152" text-anchor="middle" font-size="16.5" font-weight="600" fill="#FFFFFF">Command</text>
  <text x="402" y="173" text-anchor="middle" font-size="13" fill="#7FE9E6">one person, one plan</text>
  <!-- sparkle accent -->
  <path d="M 468 102 l 2.4 6.2 6.2 2.4 -6.2 2.4 -2.4 6.2 -2.4 -6.2 -6.2 -2.4 6.2 -2.4 z" fill="#36C9C6"/>

  <!-- Lines to outputs -->
  <g stroke="#0D8E8C" stroke-width="1.8" fill="none">
    <path d="M 480 134 C 516 110, 530 84, 552 66" marker-end="url(#icArrow)"/>
    <path d="M 480 146 C 516 134, 530 124, 552 116" marker-end="url(#icArrow)"/>
    <path d="M 480 158 C 516 158, 530 162, 552 164" marker-end="url(#icArrow)"/>
    <path d="M 480 170 C 516 184, 530 200, 552 212" marker-end="url(#icArrow)"/>
    <path d="M 480 182 C 516 210, 530 240, 552 260" marker-end="url(#icArrow)"/>
  </g>

  <!-- Output chips -->
  <g font-size="13.5" fill="#142A2E">
    <rect x="558" y="48" width="176" height="36" rx="9" fill="#FFFFFF" stroke="#0D8E8C" stroke-width="1.6"/>
    <text x="646" y="71" text-anchor="middle">One plan</text>

    <rect x="558" y="98" width="176" height="36" rx="9" fill="#FFFFFF" stroke="#0D8E8C" stroke-width="1.6"/>
    <text x="646" y="121" text-anchor="middle">Clear decisions</text>

    <rect x="558" y="148" width="176" height="36" rx="9" fill="#FFFFFF" stroke="#0D8E8C" stroke-width="1.6"/>
    <text x="646" y="171" text-anchor="middle">Plain-language updates</text>

    <rect x="558" y="198" width="176" height="36" rx="9" fill="#FFFFFF" stroke="#0D8E8C" stroke-width="1.6"/>
    <text x="646" y="221" text-anchor="middle">Recovery</text>

    <rect x="558" y="248" width="176" height="36" rx="9" fill="#FFFFFF" stroke="#0D8E8C" stroke-width="1.6"/>
    <text x="646" y="271" text-anchor="middle">Hardening after</text>
  </g>

  <!-- Caption -->
  <text x="380" y="312" text-anchor="middle" font-size="14" fill="#142A2E">In a real incident the scarce resource isn't expertise. It's command.</text>
</svg>
