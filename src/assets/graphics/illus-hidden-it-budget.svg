  <line x1="0" y1="150" x2="640" y2="150" stroke="#0D8E8C" stroke-width="1.5" stroke-dasharray="2 6" opacity="0.55"/>
  <text x="30" y="140" font-family="Geist, Inter, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="700" fill="#7E9496" text-anchor="start" letter-spacing="2">WATERLINE</text>
  <!-- underwater mass -->
