<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-label="Two assessment tracks. Essential, built on the CIS Controls, and Comprehensive, built on the NIST Cybersecurity Framework. Both lead to one prioritized roadmap, and the Essential track maps forward into the Comprehensive one.">
  <style>
    text { font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }
  </style>
  <defs>
    <marker id="atArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#142A2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="atArrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#0D8E8C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Start node -->
  <rect x="22" y="118" width="140" height="56" rx="28" fill="#F4FAFA" stroke="#142A2E" stroke-width="2"/>
  <text x="92" y="142" text-anchor="middle" font-size="14.5" font-weight="600" fill="#142A2E">Two ways in</text>
  <text x="92" y="160" text-anchor="middle" font-size="12.5" fill="#7E9496">where you are today</text>

  <!-- Fork lines -->
  <path d="M 156 134 C 186 130, 196 112, 212 106" fill="none" stroke="#142A2E" stroke-width="2" marker-end="url(#atArrow)"/>
  <path d="M 156 158 C 186 162, 196 180, 212 186" fill="none" stroke="#142A2E" stroke-width="2" marker-end="url(#atArrow)"/>

  <!-- Track A: Essential -->
  <rect x="218" y="62" width="260" height="78" rx="14" fill="#FFFFFF" stroke="#0D8E8C" stroke-width="2"/>
  <text x="236" y="86" font-size="12.5" font-weight="600" letter-spacing="1.2" fill="#0D8E8C">ESSENTIAL</text>
  <text x="236" y="107" font-size="15" font-weight="600" fill="#142A2E">CIS Controls baseline</text>
  <text x="236" y="126" font-size="13" fill="#7E9496">the turn-by-turn directions</text>

  <!-- Track B: Comprehensive -->
  <rect x="218" y="160" width="260" height="78" rx="14" fill="#FFFFFF" stroke="#0D8E8C" stroke-width="2"/>
  <text x="236" y="184" font-size="12.5" font-weight="600" letter-spacing="1.2" fill="#0D8E8C">COMPREHENSIVE</text>
  <text x="236" y="205" font-size="15" font-weight="600" fill="#142A2E">NIST CSF program view</text>
  <text x="236" y="224" font-size="13" fill="#7E9496">the map a board recognizes</text>

  <!-- Maps-forward arrow -->
  <line x1="348" y1="144" x2="348" y2="156" stroke="#0D8E8C" stroke-width="1.8" stroke-dasharray="4 4" marker-end="url(#atArrowTeal)"/>
  <text x="362" y="153" font-size="11" fill="#7E9496">carries forward</text>

  <!-- Converge lines -->
  <path d="M 478 101 C 510 106, 520 128, 538 136" fill="none" stroke="#142A2E" stroke-width="2" marker-end="url(#atArrow)"/>
  <path d="M 478 199 C 510 194, 520 172, 538 164" fill="none" stroke="#142A2E" stroke-width="2" marker-end="url(#atArrow)"/>

  <!-- Output node -->
  <rect x="544" y="106" width="190" height="88" rx="16" fill="#085451" stroke="#063E3E" stroke-width="2"/>
  <text x="639" y="142" text-anchor="middle" font-size="15.5" font-weight="600" fill="#FFFFFF">Prioritized roadmap</text>
  <text x="639" y="163" text-anchor="middle" font-size="12.5" fill="#7FE9E6">what to fix first, in order</text>
  <!-- sparkle accent -->
  <path d="M 722 94 l 2.4 6.2 6.2 2.4 -6.2 2.4 -2.4 6.2 -2.4 -6.2 -6.2 -2.4 6.2 -2.4 z" fill="#36C9C6"/>

  <!-- Caption -->
  <text x="380" y="282" text-anchor="middle" font-size="14" fill="#142A2E">Start small or go all the way. Either way, nothing is wasted.</text>
</svg>
