    <linearGradient id="hib-ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2BC0BC"/><stop offset="1" stop-color="#06504F"/></linearGradient>
    <linearGradient id="hib-rise" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0D8E8C"/><stop offset="1" stop-color="#36C9C6"/></linearGradient>
  </defs>
  <rect width="640" height="470" fill="#fff"/>
