<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" role="img" aria-label="Domains worked across: cloud, rules engines, networking, security, program management, virtualization, containers, collaboration, and enterprise architecture.">
  <style>text { font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }</style>
  <text x="360" y="32" text-anchor="middle" font-size="13" font-weight="600" letter-spacing="1.5" fill="#0D8E8C">DOMAINS I'VE WORKED ACROSS</text>
  <g fill="#F4FAFA" stroke="#CFDCDC" stroke-width="1.4">
    <rect x="108" y="64" width="64" height="64" rx="14"/><rect x="328" y="64" width="64" height="64" rx="14"/><rect x="548" y="64" width="64" height="64" rx="14"/>
    <rect x="108" y="190" width="64" height="64" rx="14"/><rect x="328" y="190" width="64" height="64" rx="14"/><rect x="548" y="190" width="64" height="64" rx="14"/>
    <rect x="108" y="316" width="64" height="64" rx="14"/><rect x="328" y="316" width="64" height="64" rx="14"/><rect x="548" y="316" width="64" height="64" rx="14"/>
  </g>
  <g fill="none" stroke="#0D8E8C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cloud -->
    <path d="M124 104 a12 12 0 0 1 3 -23 a16 16 0 0 1 30 2 a11 11 0 0 1 -1 21 Z"/>
    <!-- Rules engine: gear -->
    <circle cx="360" cy="92" r="12"/><circle cx="360" cy="92" r="4.5"/>
    <path d="M360 76 v-5 M360 108 v5 M344 92 h-5 M376 92 h5 M349 81 l-3.5 -3.5 M371 81 l3.5 -3.5 M349 103 l-3.5 3.5 M371 103 l3.5 3.5"/>
    <!-- Networking -->
    <circle cx="580" cy="96" r="5"/><circle cx="562" cy="80" r="4"/><circle cx="598" cy="80" r="4"/><circle cx="580" cy="114" r="4"/>
    <path d="M576 92 l-11 -9 M584 92 l11 -9 M580 101 v9"/>
    <!-- Security shield -->
    <path d="M140 200 c8 5 16 7 22 7 0 18 -9 31 -22 38 -13 -7 -22 -20 -22 -38 6 0 14 -2 22 -7 z"/>
    <path d="M130 221 l6 6 12 -14"/>
    <!-- Program management: gantt (staggered bars on an axis) -->
    <path d="M342 204 V236"/>
    <!-- Containers: two stacked container boxes with ridges -->
    <rect x="118" y="334" width="44" height="13" rx="2"/><rect x="118" y="349" width="44" height="13" rx="2"/>
    <path d="M129 334 v13 M140 334 v13 M151 334 v13 M129 349 v13 M140 349 v13 M151 349 v13"/>
    <!-- Collaboration: speech bubble -->
    <path d="M340 334 h26 a5 5 0 0 1 5 5 v10 a5 5 0 0 1 -5 5 h-14 l-7 6 v-6 a5 5 0 0 1 -5 -5 v-10 a5 5 0 0 1 5 -5 z"/>
    <!-- Virtualization: one host with virtual machines inside -->
    <rect x="560" y="204" width="40" height="36" rx="4"/>
    <rect x="566" y="210" width="11" height="11" rx="2"/><rect x="583" y="210" width="11" height="11" rx="2"/>
    <rect x="566" y="224" width="11" height="11" rx="2"/><rect x="583" y="224" width="11" height="11" rx="2"/>
    <!-- Enterprise architecture: parent-to-children hierarchy -->
    <rect x="568" y="328" width="24" height="13" rx="2"/>
    <rect x="556" y="360" width="22" height="13" rx="2"/><rect x="582" y="360" width="22" height="13" rx="2"/>
    <path d="M580 341 V351 M567 351 H593 M567 351 V360 M593 351 V360"/>
  </g>
  <!-- gantt bars (filled) -->
  <g fill="#0D8E8C">
    <rect x="346" y="206" width="30" height="6" rx="3"/>
    <rect x="356" y="217" width="20" height="6" rx="3"/>
    <rect x="350" y="228" width="32" height="6" rx="3"/>
  </g>
  <g font-size="13.5" text-anchor="middle" fill="#142A2E">
    <text x="140" y="150">Cloud</text><text x="360" y="150">Rules Engines</text><text x="580" y="150">Networking</text>
    <text x="140" y="276">Security</text><text x="360" y="276">Program Mgmt</text><text x="580" y="276">Virtualization</text>
    <text x="140" y="402">Containers</text><text x="360" y="402">Collaboration</text><text x="580" y="402">Enterprise Arch</text>
  </g>
</svg>
