<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" role="img" aria-label="Iceberg drawn to scale with a twin-peaked tip: one third above the waterline is the IT you fund; two thirds below is the real cost: security, monitoring, updates, cloud, refresh, redundancy, backup and disaster recovery, and management.">
  <style>text { font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }</style>
  <defs>
    <clipPath id="berg">
      <path d="M 334 74 L 358 116 L 380 92 L 390 200 L 444 244 L 452 312 L 444 372 L 404 418 L 352 438 L 300 432 L 258 388 L 248 318 L 256 250 L 300 200 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="200" width="700" height="300" fill="#EAF4F4"/>

  <!-- one continuous iceberg with a twin-peaked tip -->
  <path d="M 334 74 L 358 116 L 380 92 L 390 200 L 444 244 L 452 312 L 444 372 L 404 418 L 352 438 L 300 432 L 258 388 L 248 318 L 256 250 L 300 200 Z" fill="#FFFFFF"/>
  <rect x="0" y="200" width="700" height="300" fill="#CFE7E6" clip-path="url(#berg)"/>
  <!-- facets: tip ridges and two below the labels -->
  <g stroke="#0D8E8C" stroke-width="1.1" opacity="0.35" fill="none" clip-path="url(#berg)">
    <path d="M 334 74 L 346 200"/>
    <path d="M 358 116 L 356 200"/>
    <path d="M 380 92 L 372 200"/>
    <path d="M 258 388 L 322 410"/>
    <path d="M 444 372 L 384 412"/>
  </g>
  <path d="M 334 74 L 358 116 L 380 92 L 390 200 L 444 244 L 452 312 L 444 372 L 404 418 L 352 438 L 300 432 L 258 388 L 248 318 L 256 250 L 300 200 Z" fill="none" stroke="#0D8E8C" stroke-width="2" stroke-linejoin="round"/>

  <line x1="0" y1="200" x2="700" y2="200" stroke="#36C9C6" stroke-width="2" stroke-dasharray="7 7"/>
  <text x="20" y="194" font-size="12.5" letter-spacing="1.5" fill="#7E9496">WATERLINE</text>

  <!-- proportion bracket -->
  <g stroke="#7E9496" stroke-width="1.3" fill="none">
    <path d="M 600 74 H 616 M 600 200 H 616 M 600 438 H 616 M 616 74 V 200 M 616 200 V 438"/>
  </g>
  <text x="632" y="142" font-size="14" font-weight="600" fill="#0D8E8C">1/3</text>
  <text x="632" y="154" font-size="11.5" fill="#7E9496">funded</text>
  <text x="632" y="323" font-size="14" font-weight="600" fill="#085451">2/3</text>
  <text x="632" y="335" font-size="11.5" fill="#7E9496">unfunded</text>

  <!-- funded label -->
  <text x="48" y="120" font-size="13" font-weight="600" letter-spacing="1" fill="#0D8E8C">WHAT YOU FUND</text>
  <text x="48" y="142" font-size="14" fill="#142A2E">IT support, computers, licenses</text>
  <line x1="232" y1="136" x2="330" y2="150" stroke="#7E9496" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- underwater short heading + items -->
  <text x="350" y="240" text-anchor="middle" font-size="12.5" font-weight="600" letter-spacing="1" fill="#085451">THE REAL COST</text>
  <g font-size="13" fill="#0E3A38" text-anchor="middle">
    <text x="306" y="268">Security</text><text x="400" y="268">Monitoring</text>
    <text x="306" y="296">Updates</text><text x="400" y="296">Cloud</text>
    <text x="306" y="324">Refresh</text><text x="400" y="324">Redundancy</text>
    <text x="306" y="352">Backup / DR</text><text x="400" y="352">Management</text>
  </g>

  <text x="350" y="486" text-anchor="middle" font-size="14" fill="#142A2E">Two-thirds of what keeps you running sits below the surface.</text>
</svg>
