    <path d="M710 216 V200 L728 190 L746 200 V216"/><rect x="721" y="206" width="14" height="10"/>
  </g>
  <g font-size="13.5" text-anchor="middle" fill="#142A2E">
    <text x="112" y="142">Retail</text><text x="266" y="142">Hospitality</text><text x="420" y="142">Health Care</text><text x="574" y="142">Banking</text><text x="728" y="142">Insurance</text>
    <text x="112" y="262">Fintech</text><text x="266" y="262">Manufacturing</text><text x="420" y="262">Education</text><text x="574" y="262">Public Sector</text><text x="728" y="262">Warehouse &amp; Dist.</text>
