<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 430" role="img" aria-label="Venn diagram. NIST CSF, CIS Controls, and SOC 2 overlap, with HIPAA and PCI DSS layering in. Work done for one framework counts toward the others.">
  <style>text { font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }</style>
  <g stroke="#CFDCDC" stroke-width="1.4" stroke-dasharray="4 4">
    <line x1="586" y1="120" x2="452" y2="172"/>
    <line x1="600" y1="298" x2="470" y2="276"/>
  </g>
  <circle cx="350" cy="172" r="116" fill="#0D8E8C" fill-opacity="0.16" stroke="#0D8E8C" stroke-width="2"/>
  <circle cx="284" cy="274" r="116" fill="#36C9C6" fill-opacity="0.16" stroke="#0D8E8C" stroke-width="2"/>
  <circle cx="416" cy="274" r="116" fill="#085451" fill-opacity="0.14" stroke="#063E3E" stroke-width="2"/>
  <!-- circle names on white chips so they never float across strokes -->
  <g>
    <rect x="306" y="80" width="88" height="24" rx="12" fill="#FFFFFF"/>
    <text x="350" y="97" text-anchor="middle" font-size="16.5" font-weight="600" fill="#0D8E8C">NIST CSF</text>
    <rect x="156" y="300" width="104" height="24" rx="12" fill="#FFFFFF"/>
    <text x="208" y="317" text-anchor="middle" font-size="16.5" font-weight="600" fill="#0B7E7B">CIS Controls</text>
    <rect x="452" y="300" width="80" height="24" rx="12" fill="#FFFFFF"/>
    <text x="492" y="317" text-anchor="middle" font-size="16.5" font-weight="600" fill="#085451">SOC 2</text>
  </g>
  <!-- center label on a white chip at the triple overlap centroid (350,240) -->
  <rect x="306" y="230" width="88" height="22" rx="11" fill="#FFFFFF" stroke="#0D8E8C" stroke-width="1.2"/>
  <text x="350" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#142A2E">your program</text>
  <!-- satellites -->
  <g font-size="13">
    <rect x="552" y="106" width="76" height="30" rx="15" fill="#FFFFFF" stroke="#7E9496" stroke-width="1.4"/>
    <text x="590" y="125" text-anchor="middle" fill="#142A2E">HIPAA</text>
    <rect x="566" y="284" width="84" height="30" rx="15" fill="#FFFFFF" stroke="#7E9496" stroke-width="1.4"/>
    <text x="608" y="303" text-anchor="middle" fill="#142A2E">PCI DSS</text>
  </g>
  <text x="350" y="424" text-anchor="middle" font-size="14" fill="#142A2E">The frameworks overlap. Work for one counts toward the others.</text>
</svg>
