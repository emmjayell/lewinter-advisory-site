<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" role="img" aria-label="Engagement model diagram. Assess, then roadmap, then run with you, ending in a program that is yours and standing on its own.">
  <style>
    text { font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }
  </style>
  <defs>
    <marker id="emArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#142A2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Stage 1: Assess -->
  <rect x="20" y="64" width="170" height="92" rx="14" fill="#F4FAFA" stroke="#0D8E8C" stroke-width="2"/>
  <text x="105" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#142A2E">Assess</text>
  <text x="105" y="122" text-anchor="middle" font-size="13" fill="#7E9496">framework-anchored</text>
  <text x="105" y="137" text-anchor="middle" font-size="13" fill="#7E9496">findings</text>

  <line x1="196" y1="110" x2="208" y2="110" stroke="#142A2E" stroke-width="2.4" marker-end="url(#emArrow)"/>

  <!-- Stage 2: Roadmap -->
  <rect x="214" y="64" width="170" height="92" rx="14" fill="#F4FAFA" stroke="#0D8E8C" stroke-width="2"/>
  <text x="299" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#142A2E">Roadmap</text>
  <text x="299" y="122" text-anchor="middle" font-size="13" fill="#7E9496">sequenced, prioritized,</text>
  <text x="299" y="137" text-anchor="middle" font-size="13" fill="#7E9496">owned</text>

  <line x1="390" y1="110" x2="402" y2="110" stroke="#142A2E" stroke-width="2.4" marker-end="url(#emArrow)"/>

  <!-- Stage 3: Run with you -->
  <rect x="408" y="64" width="170" height="92" rx="14" fill="#F4FAFA" stroke="#0D8E8C" stroke-width="2"/>
  <text x="493" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#142A2E">Run with you</text>
  <text x="493" y="122" text-anchor="middle" font-size="13" fill="#7E9496">leadership until</text>
  <text x="493" y="137" text-anchor="middle" font-size="13" fill="#7E9496">handoff</text>

  <line x1="584" y1="110" x2="596" y2="110" stroke="#142A2E" stroke-width="2.4" marker-end="url(#emArrow)"/>

  <!-- Terminal: Yours -->
  <rect x="602" y="64" width="140" height="92" rx="16" fill="#085451" stroke="#063E3E" stroke-width="2"/>
  <text x="672" y="102" text-anchor="middle" font-size="16" font-weight="600" fill="#FFFFFF">Yours.</text>
  <text x="672" y="124" text-anchor="middle" font-size="13" fill="#7FE9E6">standing on its own</text>
  <!-- sparkle accent -->
  <path d="M 730 52 l 2.4 6.2 6.2 2.4 -6.2 2.4 -2.4 6.2 -2.4 -6.2 -6.2 -2.4 6.2 -2.4 z" fill="#36C9C6"/>

  <!-- Caption -->
  <text x="380" y="212" text-anchor="middle" font-size="14" fill="#142A2E">Each phase stands on its own. Nothing auto-funnels into the next sale.</text>
</svg>
